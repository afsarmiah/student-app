<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School App</title>

  <!-- THIRD PARTY STYLES -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <!-- OUR STYLES -->

  <!-- THIRD PARTY SCRIPTS -->

<body>
  <header class="student-header">
    <div class="student-wrapper">
      <a href="/">
        <h1 class="student-header__title">Student Enrollment System</h1>
        <h1>Afsar Miah</h1>
      </a>
      <a class="student-header__button button" href="/add.html">Add Student</a>
    </div>
  </header>

  <main>
    <table class="student-table">
      <thead class="student-table__header">
        <tr class="student-table__row">
          <th class="student-table__title">Name</th>
          <th class="student-table__title">Age</th>
          <th class="student-table__title">Gender</th>
          <th class="student-table__title">Year Group</th>
          <th class="student-table__title">Course</th>
          <th class="student-table__title">Status</th>
          <th class="student-table__title">Actions</th>
        </tr>
      </thead>
      <tbody class="student-table__body">
        <tr class="student-table__body-row">
          <td class="student-table__name">Afsar Miah</td>
          <td class="student-table-info">25</td>
          <td class="student-table-info">Male</td>
          <td class="student-table-info">Year 12</td>
          <td class="student-table-info">Maths</td>
          <td class="student-table-pending">Pending</td>
          <td>
            <a class="student-table__update-button button" href="/update.html?id=abc123">Update</a>
            <button class="student-table__delete-button">Delete</button>
          </td>
        </tr>
        <tr class="student-table__body-row">
          <td class="student-table__name">Lily</td>
          <td class="student-table-info">26</td>
          <td class="student-table-info">Male</td>
          <td class="student-table-info">Year 13</td>
          <td class="student-table-info">English</td>
          <td class="student-table-pending">Pending</td>
          <td>
            <a class="student-table__update-button button" href="/update.html?id=abc123">Update</a>
            <button class="student-table__delete-button">Delete</button>
          </td>
        </tr>
        <tr class="student-table__body-row">
          <td class="student-table__name">Koysor Miah</td>
          <td class="student-table-info">28</td>
          <td class="student-table-info">Male</td>
          <td class="student-table-info">Year 15</td>
          <td class="student-table-info">Biology</td>
          <td class="student-table-pending">Pending</td>
          <td>
            <a class="student-table__update-button button" href="/update.html?id=abc123">Update</a>
            <button class="student-table__delete-button ">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </main>

</html>
